# defines the permissions needed for Siriusec k8s integration tests to run in a cluster
# namespace for siriusec tests
apiVersion: v1
kind: Namespace
metadata:
  name: teletest
---
# clusterrole granting overarching privileges
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ci-siriusec
rules:
- apiGroups: [""]
  resources: ["users", "groups"]
  verbs: ["impersonate"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["create"]
---
# role to allow pod operations in teletest namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-siriusec-sa
  namespace: teletest
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["create"]
---
# role to allow pod operations via impersonation in teletest namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-siriusec-group
  namespace: teletest
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get"]
  resourceNames: ["test-pod"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
  resourceNames: ["test-pod"]
- apiGroups: [""]
  resources: ["pods/portforward"]
  verbs: ["create"]
  resourceNames: ["test-pod"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ci-siriusec
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ci-siriusec
subjects:
- kind: ServiceAccount
  name: siriusec-sa
  namespace: ci-siriusec
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-siriusec-sa
  namespace: teletest
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ci-siriusec-sa
subjects:
- kind: ServiceAccount
  name: siriusec-sa
  namespace: ci-siriusec
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-siriusec-group
  namespace: teletest
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ci-siriusec-group
subjects:
- kind: Group
  name: siriusec-ci-test-group
