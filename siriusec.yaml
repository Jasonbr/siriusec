teleport:
  nodename: localhost
  data_dir: /tmp/siriusec-v739-official-data
  log:
    output: stderr
    severity: INFO

auth_service:
  enabled: true
  listen_addr: 0.0.0.0:3025
  cluster_name: localhost
  authentication:
    type: local
    second_factor: off
  tokens:
    - "node,auth,proxy:admin-token"

proxy_service:
  enabled: true
  listen_addr: 0.0.0.0:3023
  web_listen_addr: 0.0.0.0:3080
  tunnel_listen_addr: 0.0.0.0:3024

ssh_service:
  enabled: true
  listen_addr: 0.0.0.0:3022

db_service:
  enabled: true
  databases:
  - name: mysql-sample
    protocol: mysql
    uri: 127.0.0.1:3506
    static_labels:
      env: production
      type: mysql
      sample_user: sample
