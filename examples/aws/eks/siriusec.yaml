export SIRIUSEC_PUBLIC_DNS_NAME="[siriusec-proxy.example.com]"
export SIRIUSEC_CLUSTER_NAME="[siriusec-cluster-name]"
  cat > siriusec.yaml << EOF
  # By default, this file should be stored in /etc/siriusec.yaml
  siriusec:
    nodename: $SIRIUSEC_PUBLIC_DNS_NAME
    cluster_name: $SIRIUSEC_CLUSTER_NAME
    data_dir: /var/lib/siriusec
    log:
      output: stderr
      severity: ERROR
    storage:
      type: dir
    auth_servers:
    - 127.0.0.1:3025
    log:
      output: stderr
      severity: INFO
    auth_service:
      enabled: "yes"
      authentication:
          type: github
    ssh_service:
      enabled: "no"
    proxy_service:
      enabled: "yes"
      listen_addr: 0.0.0.0:3023
      web_listen_addr: 0.0.0.0:3080
      tunnel_listen_addr: 0.0.0.0:3024
      public_addr: $SIRIUSEC_PUBLIC_DNS_NAME:3080
      # TLS certificate for the HTTPS connection. Configuring these properly is
      # critical for Siriusec security.
      https_key_file: /etc/letsencrypt/live/$SIRIUSEC_PUBLIC_DNS_NAME/privkey.pem
      https_cert_file: /etc/letsencrypt/live/$SIRIUSEC_PUBLIC_DNS_NAME/fullchain.pem
      kubernetes:
          enabled: yes
          public_addr: $SIRIUSEC_PUBLIC_DNS_NAME:3026
          listen_addr: 0.0.0.0:3026
          kubeconfig_file: /home/ec2-user/.kube/config
EOF
