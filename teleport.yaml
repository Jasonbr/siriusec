siriusec:
  nodename: localhost
  data_dir: /tmp/teleport-v739-official-data
  log:
    output: stderr
    severity: INFO

auth_service:
  enabled: true
  listen_addr: 0.0.0.0:3025
  cluster_name: localhost
  authentication:
    type: local
    second_factor: off

proxy_service:
  enabled: true
  listen_addr: 0.0.0.0:3023
  web_listen_addr: 0.0.0.0:3080
  tunnel_listen_addr: 0.0.0.0:3024

ssh_service:
  enabled: true
  listen_addr: 0.0.0.0:3022
