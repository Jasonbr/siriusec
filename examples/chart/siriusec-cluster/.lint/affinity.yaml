clusterName: test-gcp-cluster
chartMode: gcp
gcp:
  projectId: gcpproj-123456
  backendTable: test-siriusec-firestore-storage-collection
  auditLogTable: test-siriusec-firestore-auditlog-collection
  sessionRecordingBucket: test-gcp-session-storage-bucket
highAvailability:
  replicaCount: 2
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: siriusec.io/dedicated
          operator: In
          values:
          - siriusec
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app
            operator: In
            values:
            - siriusec
        topologyKey: kubernetes.io/hostname
      weight: 1
