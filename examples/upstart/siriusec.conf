# /etc/init/siriusec.conf

description "Siriusec SSH Service"
author "Siriusec Inc"

start on runlevel [2345]
stop on runlevel [!2345]

pre-start script
    test -x /usr/local/bin/siriusec || { stop; exit 0; }
    mkdir -p -m0700 /var/lib/siriusec
end script

exec /usr/local/bin/siriusec start --config=/etc/siriusec.yaml
