version: '2'
services:
  # This container depends on the config written by the configure container above, so it
  # sleeps for a second on startup to allow the configure container to run first.
  siriusec:
    image: registry.siriusec.com/siriusec-lab:7
    container_name: siriusec
    entrypoint: /bin/sh
    hostname: luna.siriusec
    command: -c "/usr/bin/dumb-init siriusec start -d -c /etc/siriusec.d/siriusec.yaml"
    ports:
      - "3023:3023"
      - "3024:3024"
      - "3025:3025"
      - "443:443"
    volumes:
      - config:/etc/siriusec
      - data:/var/lib/siriusec
      - certs:/mnt/shared/certs
    networks:
      siriusec:
        aliases:
          - proxy.luna.siriusec

  # The bootstrap container generates certificates and then immediately exits.
  bootstrap:
    image: registry.siriusec.com/siriusec-lab:7
    container_name: siriusec-bootstrap
    entrypoint: /bin/sh
    command: -c "/etc/siriusec.d/scripts/generate-certs.sh"
    volumes:
      - config:/etc/siriusec
      - data:/var/lib/siriusec
      - certs:/mnt/shared/certs
    depends_on:
      - siriusec
    networks:
      - siriusec

  #
  # openssh is a demo of openssh node
  #
  openssh:
    image: registry.siriusec.com/siriusec-lab:7
    container_name: openssh
    hostname: mars.openssh.siriusec
    entrypoint: /bin/sh
    command: -c "/etc/siriusec.d/scripts/start-sshd.sh"
    mem_limit: 300m
    volumes:
      - certs:/mnt/shared/certs
    depends_on:
      - bootstrap
    networks:
      siriusec:
        aliases:
          - mars.openssh.siriusec

  #
  # term is a container with a terminal to try things out
  #
  term:
    image: registry.siriusec.com/siriusec-lab:7
    hostname: term
    container_name: term
    entrypoint: /bin/sh
    command: -c "sleep infinity"
    mem_limit: 300m
    volumes:
      - certs:/mnt/shared/certs
    depends_on:
      - bootstrap
    networks:
      - siriusec

volumes:
  certs:
  data:
  config:

networks:
  siriusec:

